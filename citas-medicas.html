<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Citas Médicas</title>

<style>
:root{
  --primary:#4f46e5;
  --secondary:#06b6d4;
  --danger:#ef4444;
  --success:#22c55e;
  --bg:#f1f5f9;
  --card:#ffffff;
}

body{
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #4f46e5, #06b6d4);
  margin:0;
  padding:20px;
  color:#333;
}

.container{
  max-width:950px;
  margin:auto;
  background:var(--card);
  padding:25px;
  border-radius:15px;
  box-shadow:0 10px 30px rgba(0,0,0,.2);
}

h1{
  text-align:center;
  color:var(--primary);
  margin-bottom:20px;
}

.form-grid{
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
  gap:10px;
}

input{
  padding:10px;
  border-radius:8px;
  border:1px solid #ccc;
  outline:none;
  transition:.2s;
}

input:focus{
  border-color:var(--primary);
  box-shadow:0 0 5px rgba(79,70,229,.4);
}

button{
  padding:12px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
  transition:.2s;
}

.btn-guardar{
  background:linear-gradient(135deg, var(--primary), var(--secondary));
  color:white;
}

.btn-guardar:hover{
  transform:scale(1.03);
}

table{
  width:100%;
  margin-top:20px;
  border-collapse: collapse;
  overflow:hidden;
  border-radius:10px;
}

th{
  background:var(--primary);
  color:white;
  padding:12px;
}

td{
  padding:10px;
  text-align:center;
  border-bottom:1px solid #ddd;
}

tr:hover{
  background:#f9fafb;
}

.acciones button{
  padding:6px 10px;
  margin:2px;
  border-radius:6px;
  color:white;
}

.editar{
  background:var(--secondary);
}

.eliminar{
  background:var(--danger);
}

.footer{
  text-align:center;
  margin-top:15px;
  font-size:14px;
  color:#555;
}
</style>
</head>

<body>

<div class="container">
<h1>🩺 Sistema de Citas Médicas</h1>

<input type="hidden" id="id">

<div class="form-grid">
<input type="text" id="paciente" placeholder="Paciente">
<input type="text" id="doctor" placeholder="Doctor">
<input type="date" id="fecha">
<input type="time" id="hora">
</div>

<button class="btn-guardar" onclick="guardarCita()">Guardar Cita</button>

<table>
<thead>
<tr>
<th>ID</th>
<th>Paciente</th>
<th>Doctor</th>
<th>Fecha</th>
<th>Hora</th>
<th>Acciones</th>
</tr>
</thead>
<tbody id="tablaCitas"></tbody>
</table>

<div class="footer">
Sistema CRUD | Diseño moderno ✨
</div>

</div>

<script>
let citas = JSON.parse(localStorage.getItem('citas')) || [];

function guardarCita(){

let id = document.getElementById('id').value;
let paciente = document.getElementById('paciente').value.trim();
let doctor = document.getElementById('doctor').value.trim();
let fecha = document.getElementById('fecha').value;
let hora = document.getElementById('hora').value;

if(!paciente || !doctor || !fecha || !hora){
alert('Completa todos los campos');
return;
}

if(id === ''){

let cita = {
id: Date.now(),
paciente,
doctor,
fecha,
hora
};

citas.push(cita);

}else{

let index = citas.findIndex(c => c.id == id);

if(index === -1){
alert('Error al editar');
limpiar();
return;
}

citas[index] = {...citas[index], paciente, doctor, fecha, hora};
}

localStorage.setItem('citas', JSON.stringify(citas));

limpiar();
mostrarCitas();
}

function mostrarCitas(){

let tabla = document.getElementById('tablaCitas');
tabla.innerHTML = '';

citas.forEach(cita => {

let fila = `
<tr>
<td>${cita.id}</td>
<td>${cita.paciente}</td>
<td>${cita.doctor}</td>
<td>${cita.fecha}</td>
<td>${cita.hora}</td>
<td class="acciones">
<button class="editar" onclick="editarCita(${cita.id})">Editar</button>
<button class="eliminar" onclick="eliminarCita(${cita.id})">Eliminar</button>
</td>
</tr>
`;

tabla.innerHTML += fila;

});
}

function editarCita(id){
let cita = citas.find(c => c.id == id);
if(!cita){ alert('No existe'); return; }

document.getElementById('id').value = cita.id;
document.getElementById('paciente').value = cita.paciente;
document.getElementById('doctor').value = cita.doctor;
document.getElementById('fecha').value = cita.fecha;
document.getElementById('hora').value = cita.hora;
}

function eliminarCita(id){
if(confirm('¿Eliminar cita?')){
citas = citas.filter(c => c.id != id);
localStorage.setItem('citas', JSON.stringify(citas));
mostrarCitas();
}
}

function limpiar(){
document.getElementById('id').value = '';
document.getElementById('paciente').value = '';
document.getElementById('doctor').value = '';
document.getElementById('fecha').value = '';
document.getElementById('hora').value = '';
}

mostrarCitas();
</script>

</body>
</html>
