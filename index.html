  <!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro</title>

<style>
body{
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #4f46e5, #06b6d4);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
}

.container{
  background:white;
  padding:30px;
  border-radius:15px;
  box-shadow:0 10px 30px rgba(0,0,0,.2);
  width:320px;
  text-align:center;
}

h2{
  margin-bottom:20px;
  color:#4f46e5;
}

input{
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:8px;
  border:1px solid #ccc;
  outline:none;
}

input:focus{
  border-color:#4f46e5;
  box-shadow:0 0 5px rgba(79,70,229,.4);
}

button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  background:linear-gradient(135deg,#4f46e5,#06b6d4);
  color:white;
  font-weight:bold;
  cursor:pointer;
  margin-top:10px;
}

button:hover{
  transform:scale(1.03);
}

.link{
  margin-top:10px;
  font-size:14px;
}

a{
  color:#06b6d4;
  text-decoration:none;
}

a:hover{
  text-decoration:underline;
}
</style>

</head>

<body>

<div class="container">
  <h2>Crear Cuenta</h2>

  <input type="email" id="email" placeholder="Correo">
  <input type="password" id="password" placeholder="Contraseña">

  <button onclick="registrar()">Registrarse</button>

  <div class="link">
    ¿Ya tienes cuenta? <a href="login.html">Iniciar sesión</a>
  </div>
</div>


<!-- Firebase -->
<script type="module" src="./auth.js"></script>

</body>
</html>
